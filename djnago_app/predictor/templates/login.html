{% extends 'base.html' %}

{% block title %}Login | Student Dropout Prediction System{% endblock %}

{% block content %}
<div class="login-page">
<div class="login-card">

<div class="text-center">
<div style="font-size:48px;color:var(--primary);"><i class="bi bi-mortarboard-fill"></i></div>
<h2 class="title">Student Dropout Prediction System</h2>
<p>MIT Final Project &mdash; Sign in to continue</p>
</div>

{% if error %}
<div class="alert alert-danger">{{ error }}</div>
{% endif %}

<form method="POST">
{% csrf_token %}

<div class="mb-3">
<label class="form-label">Username</label>
<input type="text" name="username" class="form-control" placeholder="Enter your username" autofocus required>
</div>

<div class="mb-4">
<label class="form-label">Password</label>
<input type="password" name="password" class="form-control" placeholder="Enter your password" required>
</div>

<button type="submit" class="btn btn-login">LOGIN</button>

</form>

</div>
</div>
{% endblock %}
