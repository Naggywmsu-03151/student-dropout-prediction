<div class="navbar-top">
  <div class="navbar-left">
    <button class="sidebar-toggle" id="sidebarToggle">
      <i class="bi bi-list"></i>
    </button>
    <div class="page-title">{% block page_title %}Dashboard{% endblock %}</div>
  </div>

  <div class="navbar-right">
    <button class="navbar-icon-btn">
      <i class="bi bi-bell"></i>
      <span class="dot"></span>
    </button>

    <div class="dropdown">
      <div class="user-profile" data-bs-toggle="dropdown" aria-expanded="false">
        <div class="avatar">{{ request.user.username|first|upper }}</div>
        <div class="user-meta">
          <div class="user-name">{{ request.user.username }}</div>
          <div class="user-role">Administrator</div>
        </div>
        <i class="bi bi-chevron-down" style="font-size:12px;color:var(--gray);"></i>
      </div>
      <ul class="dropdown-menu dropdown-menu-end">
        <li><a class="dropdown-item" href="/admin/"><i class="bi bi-person me-2"></i>Admin Panel</a></li>
        <li><hr class="dropdown-divider"></li>
        <li><a class="dropdown-item" href="{% url 'logout' %}"><i class="bi bi-box-arrow-right me-2"></i>Logout</a></li>
      </ul>
    </div>
  </div>
</div>
